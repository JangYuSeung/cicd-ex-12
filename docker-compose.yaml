services:
  nginx-app:
    image: ${ECR_REGISTRY}/${NGINX_ECR_REPOSITORY}:${IMAGE_TAG}
    container_name: nginx-container
    ports:
      - "80:80"
    volumes:
      - /home/ec2-user/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - /home/ec2-user/nginx/html:/usr/share/nginx/html
      - /home/ec2-user/nginx/logs:/var/log/nginx
    depends_on:
      - fastapi-app          # fastapi가 먼저 뜬 후 nginx 시작
    restart: always
    networks:
      app-network:
        aliases:
          - nginx-svc

  fastapi-app:
    image: ${ECR_REGISTRY}/${FASTAPI_ECR_REPOSITORY}:${IMAGE_TAG}
    container_name: fastapi-container
    expose:
      - "8000"               # 외부 포트 노출 안 함 - nginx만 접근
    restart: always
    networks:
      app-network:
        aliases:
          - fastapi-svc      # nginx의 default.conf에서 이 이름으로 접근

networks:
  app-network:
    driver: bridge